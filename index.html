// local log UI
function addLog(status, time) {
  const now = new Date().toLocaleTimeString();
  const color = status === "ONLINE" ? "#cfcfcf" : "#ff6b6b";

  const log = document.createElement("div");
  log.className = "log-line";
  log.innerHTML = `[${now}] STATUS: <span style="color:${color}">${status}</span> | ${time} ms`;

  logs.appendChild(log);

  if (logs.children.length > maxLogs) {
    logs.removeChild(logs.firstChild);
  }

  logs.scrollTop = logs.scrollHeight;
}

async function loadSparepartDropdown(){

    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/sparepart_stock?select=id,nama`,
        {
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const data = await res.json();

    const select = document.getElementById("stock_sparepart");

    select.innerHTML = `<option value="">Pilih Sparepart</option>`;

    data.forEach(item=>{
        select.innerHTML += `
            <option value="${item.id}">
                ${item.nama}
            </option>
        `;
    });
}

async function saveStock(){

    const sparepartId =
        document.getElementById("stock_sparepart").value;

    const sparepartBaru =
        document.getElementById("stock_sparepart_baru")
        .value
        .trim();

    const satuan =
        document.getElementById("stock_satuan")
        .value
        .trim() || "PCS";

    const jumlah = parseFloat(
        document.getElementById("stock_jumlah").value
    );

    if(!jumlah || jumlah <= 0){
        alert("Masukkan jumlah stok");
        return;
    }

    let namaSparepart = "";

    // ===================================
    // TAMBAH SPAREPART BARU
    // ===================================
    if(sparepartBaru){

        namaSparepart = sparepartBaru;

        const insert = await fetch(
            `${SUPABASE_URL}/rest/v1/sparepart_stock`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    apikey:SUPABASE_KEY,
                    Authorization:`Bearer ${SUPABASE_KEY}`
                },
                body:JSON.stringify({
                    nama: sparepartBaru,
                    stok: jumlah,
                    satuan: satuan
                })
            }
        );

        if(!insert.ok){
            alert("Gagal menambah sparepart baru");
            return;
        }

    }else{

        // ===================================
        // TAMBAH STOK SPAREPART LAMA
        // ===================================
        if(!sparepartId){
            alert("Pilih sparepart atau isi sparepart baru");
            return;
        }

        const cek = await fetch(
            `${SUPABASE_URL}/rest/v1/sparepart_stock?id=eq.${sparepartId}&select=*`,
            {
                headers:{
                    apikey:SUPABASE_KEY,
                    Authorization:`Bearer ${SUPABASE_KEY}`
                }
            }
        );

        const data = await cek.json();

        if(!data.length){
            alert("Data sparepart tidak ditemukan");
            return;
        }

        const stokBaru =
            Number(data[0].stok) + jumlah;

        namaSparepart = data[0].nama;

        const update = await fetch(
            `${SUPABASE_URL}/rest/v1/sparepart_stock?id=eq.${sparepartId}`,
            {
                method:"PATCH",
                headers:{
                    "Content-Type":"application/json",
                    apikey:SUPABASE_KEY,
                    Authorization:`Bearer ${SUPABASE_KEY}`
                },
                body:JSON.stringify({
                    stok: stokBaru
                })
            }
        );

        if(!update.ok){
            alert("Gagal update stok");
            return;
        }
    }

    // ===================================
    // SIMPAN RIWAYAT
    // ===================================
    await fetch(
        `${SUPABASE_URL}/rest/v1/stock_history`,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            },
            body:JSON.stringify({
                nama_sparepart:namaSparepart,
                tipe:"IN",
                jumlah:jumlah,
                catatan:"Tambah stok manual"
            })
        }
    );

    alert("Stok berhasil ditambahkan");

    document.getElementById("stock_jumlah").value = "";
    document.getElementById("stock_sparepart_baru").value = "";

    loadSparepartStock();
    loadSparepartDropdown();
    loadSparepartOption();

    toggleStockForm();
}

async function checkERP() {

    const output = document.getElementById("output");

    try {

        const res = await fetch("/api/check-erp");

        const data = await res.json();

        const statusText =
            data.status === "ONLINE"
            ? '<span class="ok">ONLINE</span>'
            : '<span class="bad">OFFLINE</span>';

        output.innerHTML = `
            <div class="line">---------------------------</div>
            <div class="line">STATUS : ${statusText}</div>
            <div class="line">TARGET : ${data.url}</div>
            <div class="line">RESPONSE CHECK : ${data.responseTime} ms</div>
            <div class="line">LAST UPDATE : ${new Date().toLocaleString("id-ID")}</div>
            <div class="line">---------------------------</div>
        `;

        addLog(data.status, data.responseTime);

        sendToSupabase(
            data.status,
            data.responseTime
        );

    } catch(err){

        output.innerHTML = `
            <div class="line">---------------------------</div>
            <div class="line">STATUS : <span class="bad">OFFLINE</span></div>
            <div class="line">ERROR : ${err.message}</div>
            <div class="line">LAST UPDATE : ${new Date().toLocaleString("id-ID")}</div>
            <div class="line">---------------------------</div>
        `;

        addLog("OFFLINE",0);
    }
}

    sparepartSelect = new TomSelect("#sparepart",{
        plugins:["remove_button"],

function toggleStockForm(){

    const form = document.getElementById("stockForm");
    const table = document.getElementById("stockTable");

    const isHidden = form.style.display === "none" || form.style.display === "";

    if(isHidden){
        form.style.display = "block";
        table.parentElement.style.display = "none";
    } else {
        form.style.display = "none";
        table.parentElement.style.display = "table";
    }
}

async function loadSparepartStock() {

  try {

    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/sparepart_stock?select=*`,
      {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      }
    );

    const data = await response.json();

    const table = document.getElementById("stockTable");

    if (!data.length) {
      table.innerHTML =
        "<tr><td colspan='2'>No Data</td></tr>";
      return;
    }

    let html = "";

    data.forEach(item => {

      let cls = "good-stock";

      if (item.stok <= 5)
        cls = "low-stock";
      else if (item.stok <= 20)
        cls = "medium-stock";

      let stokView = `${item.stok} ${item.satuan}`;

if(item.stok <= 1){
  stokView = `
    <span class="badge bg-danger stock-critical">
      <i class="bi bi-exclamation-triangle-fill"></i>
      ${item.stok} ${item.satuan}
    </span>
  `;
}

html += `
  <tr>
    <td>${item.nama}</td>
    <td class="${cls}">
      ${stokView}
    </td>
  </tr>
`;
    });

    table.innerHTML = html;

  } catch(err) {
    console.log(err);

    document.getElementById("stockTable").innerHTML =
      "<tr><td colspan='2'>Failed Load</td></tr>";
  }
}

function toggleStockHistory(){

    const form = document.getElementById("stockForm");
    const history = document.getElementById("stockHistoryBox");
    const table = document.querySelector("#stockTable").closest("table");

    const show = history.style.display === "none" || history.style.display === "";

    if(show){
        history.style.display = "block";
        form.style.display = "none";
        table.style.display = "none";

        loadStockHistory();
    } else {
        history.style.display = "none";
        table.style.display = "table";
    }
}

async function loadStockHistory(){

    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/stock_history?select=*&order=id.desc`,
        {
            headers:{
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const data = await res.json();

    const box = document.getElementById("stockHistoryList");

    if(!data.length){
        box.innerHTML = "<p>Tidak ada data</p>";
        return;
    }

    let html = "";

    data.forEach(item => {

        const dt = item.created_at
            ? new Date(item.created_at).toLocaleString("id-ID")
            : "-";

        html += `
        <div class="task-card">

            <div class="d-flex justify-content-between">

                <div>
                    <b>${item.nama_sparepart}</b><br>
                    <span style="color:#0dcaf0;">
                        +${item.jumlah}
                    </span>
                    <small>(${item.tipe})</small>
                </div>

                <div class="text-end" style="font-size:11px;color:#777;">
                    ${dt}
                </div>

            </div>

            <div style="font-size:11px;color:#999;">
                ${item.catatan || ''}
            </div>

        </div>
        `;
    });

    box.innerHTML = html;
}

function showStockTable(){
    document.getElementById("stockForm").style.display = "none";
    document.getElementById("stockHistoryBox").style.display = "none";
    document.querySelector("#stockTable").closest("table").style.display = "table";
}

            "https://api.open-meteo.com/v1/forecast?latitude=-7.2092&longitude=109.9206&current=temperature_2m&timezone=Asia/Jakarta"
        );

        const data = await response.json();

        const suhu = data.current.temperature_2m;

        document.getElementById("serverTemp").innerHTML =
            `${suhu.toFixed(1)} °C`;

        let status = "";

        if(suhu <= 27){

            status = `
            <span class="ok">
                NORMAL
            </span>
            `;

        }
        else if(suhu <= 30){

            status = `
            <span class="warn">
                WARNING
            </span>
            `;

        }
        else if(suhu <= 35){

            status = `
            <span class="bad">
                CRITICAL
            </span>
            `;

        }
        else{

            status = `
            <span style="color:#ff0000;font-weight:bold;">
                DANGER
            </span>
            `;

        }

        document.getElementById("tempStatus").innerHTML = status;

    } catch(err){

        console.log(err);

        document.getElementById("serverTemp").innerHTML = "-- °C";
        document.getElementById("tempStatus").innerHTML =
            "<span class='bad'>OFFLINE</span>";
    }
}


async function saveTask(){

  const now = new Date();

  // waktu WIB
  const wib = new Date(
    now.getTime() + (7 * 60 * 60 * 1000)
  );
  const selectedSparepart =
    sparepartSelect
    ? sparepartSelect.getValue()
    : [];

const sparepartText =
    [...document.getElementById("sparepart").selectedOptions]
    .map(x => x.text.split(" (")[0])
    .join(", ");

const data = {
  user_name: document.getElementById("user_name").value,
  divisi: document.getElementById("divisi").value,
  pekerjaan: document.getElementById("pekerjaan").value,
  tindakan: document.getElementById("tindakan").value,
  status: document.getElementById("status").value,

  sparepart: sparepartText,

  tanggal: wib.toISOString().replace("Z","")
};

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/it_tasks`,
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "apikey":SUPABASE_KEY,
        "Authorization":`Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify(data)
    }
  );

  if(res.ok){

    const selectedSparepart =
    sparepartSelect.items;

for(const sparepartId of selectedSparepart){

    const cek = await fetch(
        `${SUPABASE_URL}/rest/v1/sparepart_stock?id=eq.${sparepartId}&select=*`,
        {
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const stokData = await cek.json();

    if(stokData.length){

        let pengurangan = 1;

        // jika nama sparepart mengandung TONER
        if(
            stokData[0].nama
            .toUpperCase()
            .includes("TONER")
        ){
            pengurangan = 0.1;
        }

        const stokBaru =
            Number(stokData[0].stok) - pengurangan;

        if(stokBaru >= 0){

            await fetch(
                `${SUPABASE_URL}/rest/v1/sparepart_stock?id=eq.${sparepartId}`,
                {
                    method:"PATCH",
                    headers:{
                        "Content-Type":"application/json",
                        apikey:SUPABASE_KEY,
                        Authorization:`Bearer ${SUPABASE_KEY}`
                    },
                    body:JSON.stringify({
                        stok: stokBaru
                    })
                }
            );

        }
    }
}

    alert("Task berhasil disimpan");

    document.getElementById("user_name").value = "";
    document.getElementById("divisi").value = "";
    document.getElementById("pekerjaan").value = "";
    document.getElementById("tindakan").value = "";

    loadTasks();
  }
}

async function loadTasks(){

  let url =
  `${SUPABASE_URL}/rest/v1/it_tasks?select=*&order=tanggal.desc`;

  const startDate =
    document.getElementById("startDate").value;

  const endDate =
    document.getElementById("endDate").value;

  if(startDate && endDate){

    apiUrl =
    `${SUPABASE_URL}/rest/v1/it_tasks?select=*`+
    `&tanggal=gte.${startDate}`+
    `&tanggal=lte.${endDate}T23:59:59`+
    `&order=tanggal.desc`;
  }

  const res = await fetch(apiUrl,{
    headers:{
      apikey: SUPABASE_KEY,
      Authorization:`Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  // SUMMARY
  const todayWib = new Date(
    Date.now() + (7 * 60 * 60 * 1000)
  ).toISOString().substring(0,10);

  const totalTask = data.length;

  const doneTask =
    data.filter(x => x.status === "DONE").length;

  const openTask =
    data.filter(x => x.status === "OPEN").length;

  const todayTask =
    data.filter(x => {

      if(!x.tanggal) return false;

      return x.tanggal.substring(0,10) === todayWib;

    }).length;

  document.getElementById("totalTask").innerText =
    totalTask;

  document.getElementById("doneTask").innerText =
    doneTask;

  document.getElementById("openTask").innerText =
    openTask;

  document.getElementById("todayTask").innerText =
    todayTask;

  let html = "";

  data.forEach(row => {

    const dt = new Date(row.tanggal);

    const tanggal =
      dt.toLocaleDateString("id-ID");

    const jam =
      dt.toLocaleTimeString("id-ID",{
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit",
        hour12:false
      });

    html += `
    <div class="task-card">

      <div class="d-flex justify-content-between align-items-start">

        <div>

          <div class="task-user">
            ${row.user_name}

            <span style="
              color:#777;
              font-weight:400;
            ">
              (${row.divisi})
            </span>

          </div>

          <div style="
            margin-top:8px;
            color:#cfcfcf;
          ">
            ${row.pekerjaan}
          </div>

          ${
            row.tindakan
            ?
            `
            <div style="
              margin-top:8px;
              color:#999;
              font-size:12px;
            ">
              <b>Tindakan :</b>
              ${row.tindakan}

              ${
row.sparepart
?
`
<div style="
  margin-top:8px;
  color:#0dcaf0;
  font-size:12px;
">
  <b>Sparepart :</b>
  ${row.sparepart}
</div>
`
: ""
}
            </div>
            `
            : ""
          }

        </div>

        <div class="text-end">

          <div class="task-time">
            ${tanggal}
            <br>
            ${jam} WIB
          </div>

          <div class="mt-2">

            <span class="
              badge ${
                row.status === "DONE"
                ? "bg-success"
                : "bg-warning text-dark"
              }
            ">
              ${row.status}
            </span>

          </div>

        </div>

      </div>

    </div>
    `;
  });

  document.getElementById("taskList").innerHTML =
    html;

  document.getElementById("taskCount").innerText =
    data.length;
}

async function exportTask(){

  let url =
    `${SUPABASE_URL}/rest/v1/it_tasks?select=*&order=id.asc`;

  const startDate =
    document.getElementById("startDate").value;

  const endDate =
    document.getElementById("endDate").value;

  if(startDate && endDate){

    url =
      `${SUPABASE_URL}/rest/v1/it_tasks?select=*`+
      `&tanggal=gte.${startDate}`+
      `&tanggal=lte.${endDate}T23:59:59`+
      `&order=id.asc`;
  }

  const res = await fetch(url,{
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:`Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  const periode =
  startDate && endDate
  ? `${new Date(startDate).toLocaleDateString('id-ID')} s/d ${new Date(endDate).toLocaleDateString('id-ID')}`
  : 'Semua Data';

  let html = `
  <div style="text-align:center;margin-bottom:20px;">

      <h2 style="margin:0;">
          LAPORAN IT
      </h2>

      <div style="
          margin-top:5px;
          font-size:12px;
          color:#555;
      ">
          Periode : ${periode}
      </div>

  </div>

  <table border="1"
        cellspacing="0"
        cellpadding="5"
        width="100%"
        style="
          border-collapse:collapse;
          font-size:11px;
        ">

  <tr style="background:#efefef">

      <th>Tanggal</th>
      <th>Jam</th>
      <th>User</th>
      <th>Divisi</th>
      <th>Keluhan / Permintaan</th>
      <th>Tindakan IT</th>
      <th>Status</th>

  </tr>
  `;

  data.forEach(row=>{

    const dt = new Date(row.tanggal);

    const tanggal =
    dt.toLocaleDateString("id-ID",{
        timeZone:"Asia/Jakarta"
    });

    const jam =
    dt.toLocaleTimeString("id-ID",{
        timeZone:"Asia/Jakarta",
        hour12:false
    });

    html += `
    <tr>

        <td>${tanggal}</td>

        <td>${jam}</td>

        <td>${row.user_name || ''}</td>

        <td>${row.divisi || ''}</td>

        <td>${row.pekerjaan || ''}</td>

        <td>${row.tindakan || ''}</td>

        <td>${row.status || ''}</td>

    </tr>
    `;
});

  html += "</table>";

  const blob =
    window.htmlDocx.asBlob(html);

  const link =
    document.createElement("a");

  link.href =
    URL.createObjectURL(blob);

  link.download =
    `Laporan_IT_${startDate || 'Semua'}_${endDate || 'Data'}.docx`;

  link.click();
}
