<!DOCTYPE html>
<html lang="en">
<head>

  <style>

<body>

<div class="container-fluid py-3">

            <div class="card card-dark">

</div>

    <div class="card-body">

        <!-- SUMMARY -->

        <div class="row text-center mb-4">

            <div class="col-md-3">
                <div class="summary-card">
                    <div class="summary-number" id="todayTask">0</div>

                </div>
            </div>

            <div class="col-md-3">
                <div class="summary-card">
                    <div class="summary-number" id="doneTask">0</div>

                </div>
            </div>

            <div class="col-md-3">
                <div class="summary-card">
                    <div class="summary-number" id="openTask">0</div>
                    <div class="summary-title">OPEN</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="summary-card">
                    <div class="summary-number" id="totalTask">0</div>
                    <div class="summary-title">TOTAL</div>
                </div>
            </div>

        </div>


        <!-- FORM -->

        <div class="ticket-form">

            <div class="row g-3">

                <div class="col-md-4">

                    <label>Nama User</label>

                    <input
                        type="text"
                        id="user_name"
                        class="form-control bg-dark text-light"

                </div>

                <div class="col-md-4">

                    <label>Divisi</label>

                    <input
                        type="text"

                </div>

                <div class="col-md-4">

                    <label>Status</label>

        <hr>

<script>

// 🔥 SUPABASE CONFIG (ISI SENDIRI)

const logs = document.getElementById("logs");
let maxLogs = 15;

// local log UI
function addLog(status, time) {
  const now = new Date().toLocaleTimeString();
  const color = status === "ONLINE" ? "#cfcfcf" : "#ff6b6b";

  const log = document.createElement("div");
  log.className = "log-line";
  log.innerHTML = `[${now}] STATUS: <span style="color:${color}">${status}</span> | ${time} ms`;

  logs.appendChild(log);

  if (logs.children.length > maxLogs) {
    logs.removeChild(logs.firstChild);
  }

  logs.scrollTop = logs.scrollHeight;
}

// 🔥 kirim ke supabase

  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqdWdvd3R3YXdobGZwaGVtb2dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTk3OTgsImV4cCI6MjA5NjA5NTc5OH0.1LgaiyP9tPey18u6Ql6xQN7cj65lw5eZ8xOgDc5lQ6g";

async function checkERP() {
  const output = document.getElementById("output");
  const start = Date.now();

  let statusText = `<span class="warn">CHECKING...</span>`;

  try {
    await fetch(url, {
      mode: "no-cors",
      cache: "no-store"
    });

    const time = Date.now() - start;

    statusText = `<span class="ok">ONLINE</span>`;

    output.innerHTML = `
      <div class="line">---------------------------</div>
      <div class="line">STATUS : ${statusText}</div>
      <div class="line">TARGET : http://trial-ris.rapigra.co.id/</div>
      <div class="line">RESPONSE CHECK : ${time} ms</div>
      <div class="line">LAST UPDATE : ${new Date().toLocaleString()}</div>
      <div class="line">---------------------------</div>
    `;

    addLog("ONLINE", time);
    sendToSupabase("ONLINE", time);

  } catch (err) {

    const time = Date.now() - start;

    statusText = `<span class="bad">OFFLINE</span>`;

    output.innerHTML = `
      <div class="line">---------------------------</div>
      <div class="line">STATUS : ${statusText}</div>
      <div class="line">ERROR : ${err.message}</div>
      <div class="line">LAST UPDATE : ${new Date().toLocaleString()}</div>
      <div class="line">---------------------------</div>
    `;

    addLog("OFFLINE", 0);
    sendToSupabase("OFFLINE", 0);
  }
}

async function loadSparepartStock() {

  try {

    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/sparepart_stock?select=*`,
      {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      }
    );

    const data = await response.json();

    const table = document.getElementById("stockTable");

    if (!data.length) {
      table.innerHTML =
        "<tr><td colspan='2'>No Data</td></tr>";
      return;
    }

    let html = "";

    data.forEach(item => {

      let cls = "good-stock";

      if (item.stok <= 5)
        cls = "low-stock";
      else if (item.stok <= 20)
        cls = "medium-stock";

      html += `
        <tr>
          <td>${item.nama}</td>
          <td class="${cls}">
            ${item.stok} ${item.satuan}
          </td>
        </tr>
      `;
    });

    table.innerHTML = html;

  } catch(err) {
    console.log(err);

    document.getElementById("stockTable").innerHTML =
      "<tr><td colspan='2'>Failed Load</td></tr>";
  }
}

async function loadServerTemperature() {

    try {

        // Koordinat Dieng
        const response = await fetch(
            "https://api.open-meteo.com/v1/forecast?latitude=-7.2092&longitude=109.9206&current=temperature_2m&timezone=Asia/Jakarta"
        );

        const data = await response.json();

        const suhu = data.current.temperature_2m;

        document.getElementById("serverTemp").innerHTML =
            `${suhu.toFixed(1)} °C`;

        let status = "";

        if(suhu <= 27){

            status = `
            <span class="ok">
                NORMAL
            </span>
            `;

        }
        else if(suhu <= 30){

            status = `
            <span class="warn">
                WARNING
            </span>
            `;

        }
        else if(suhu <= 35){

            status = `
            <span class="bad">
                CRITICAL
            </span>
            `;

        }
        else{

            status = `
            <span style="color:#ff0000;font-weight:bold;">
                DANGER
            </span>
            `;

        }

        document.getElementById("tempStatus").innerHTML = status;

    } catch(err){

        console.log(err);

        document.getElementById("serverTemp").innerHTML = "-- °C";
        document.getElementById("tempStatus").innerHTML =
            "<span class='bad'>OFFLINE</span>";
    }
}
async function saveTask(){

  const now = new Date();

  // waktu WIB
  const wib = new Date(
    now.getTime() + (7 * 60 * 60 * 1000)
  );

  const data = {
    user_name: document.getElementById("user_name").value,
    divisi: document.getElementById("divisi").value,
    pekerjaan: document.getElementById("pekerjaan").value,
    tindakan: document.getElementById("tindakan").value,
    status: document.getElementById("status").value,

    // simpan WIB
    tanggal: wib.toISOString().replace("Z","")
  };

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/it_tasks`,
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "apikey":SUPABASE_KEY,
        "Authorization":`Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify(data)
    }
  );

  if(res.ok){

    alert("Task berhasil disimpan");

    document.getElementById("user_name").value = "";
    document.getElementById("divisi").value = "";
    document.getElementById("pekerjaan").value = "";
    document.getElementById("tindakan").value = "";

    loadTasks();
  }
}

async function loadTasks(){

  let url =
  `${SUPABASE_URL}/rest/v1/it_tasks?select=*&order=tanggal.desc`;

  const startDate =
    document.getElementById("startDate").value;

  const endDate =
    document.getElementById("endDate").value;

  if(startDate && endDate){

    apiUrl =
    `${SUPABASE_URL}/rest/v1/it_tasks?select=*`+
    `&tanggal=gte.${startDate}`+
    `&tanggal=lte.${endDate}T23:59:59`+
    `&order=tanggal.desc`;
  }

  const res = await fetch(apiUrl,{
    headers:{
      apikey: SUPABASE_KEY,
      Authorization:`Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  // SUMMARY
  const todayWib = new Date(
    Date.now() + (7 * 60 * 60 * 1000)
  ).toISOString().substring(0,10);

  const totalTask = data.length;

  const doneTask =
    data.filter(x => x.status === "DONE").length;

  const openTask =
    data.filter(x => x.status === "OPEN").length;

  const todayTask =
    data.filter(x => {

      if(!x.tanggal) return false;

      return x.tanggal.substring(0,10) === todayWib;

    }).length;

  document.getElementById("totalTask").innerText =
    totalTask;

  document.getElementById("doneTask").innerText =
    doneTask;

  document.getElementById("openTask").innerText =
    openTask;

  document.getElementById("todayTask").innerText =
    todayTask;

  let html = "";

  data.forEach(row => {

    const dt = new Date(row.tanggal);

    const tanggal =
      dt.toLocaleDateString("id-ID");

    const jam =
      dt.toLocaleTimeString("id-ID",{
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit",
        hour12:false
      });

    html += `
    <div class="task-card">

      <div class="d-flex justify-content-between align-items-start">

        <div>

          <div class="task-user">
            ${row.user_name}

            <span style="
              color:#777;
              font-weight:400;
            ">
              (${row.divisi})
            </span>

          </div>

          <div style="
            margin-top:8px;
            color:#cfcfcf;
          ">
            ${row.pekerjaan}
          </div>

          ${
            row.tindakan
            ?
            `
            <div style="
              margin-top:8px;
              color:#999;
              font-size:12px;
            ">
              <b>Tindakan :</b>
              ${row.tindakan}
            </div>
            `
            : ""
          }

        </div>

        <div class="text-end">

          <div class="task-time">
            ${tanggal}
            <br>
            ${jam} WIB
          </div>

          <div class="mt-2">

            <span class="
              badge ${
                row.status === "DONE"
                ? "bg-success"
                : "bg-warning text-dark"
              }
            ">
              ${row.status}
            </span>

          </div>

        </div>

      </div>

    </div>
    `;
  });

  document.getElementById("taskList").innerHTML =
    html;

  document.getElementById("taskCount").innerText =
    data.length;
}

async function exportTask(){

  let url =
    `${SUPABASE_URL}/rest/v1/it_tasks?select=*&order=id.asc`;

  const startDate =
    document.getElementById("startDate").value;

  const endDate =
    document.getElementById("endDate").value;

  if(startDate && endDate){

    url =
      `${SUPABASE_URL}/rest/v1/it_tasks?select=*`+
      `&tanggal=gte.${startDate}`+
      `&tanggal=lte.${endDate}T23:59:59`+
      `&order=id.asc`;
  }

  const res = await fetch(url,{
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:`Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  const periode =
  startDate && endDate
  ? `${new Date(startDate).toLocaleDateString('id-ID')} s/d ${new Date(endDate).toLocaleDateString('id-ID')}`
  : 'Semua Data';

  let html = `
  <div style="text-align:center;margin-bottom:20px;">

      <h2 style="margin:0;">
          LAPORAN IT
      </h2>

      <div style="
          margin-top:5px;
          font-size:12px;
          color:#555;
      ">
          Periode : ${periode}
      </div>

  </div>

  <table border="1"
        cellspacing="0"
        cellpadding="5"
        width="100%"
        style="
          border-collapse:collapse;
          font-size:11px;
        ">

  <tr style="background:#efefef">

      <th>Tanggal</th>
      <th>Jam</th>
      <th>User</th>
      <th>Divisi</th>
      <th>Keluhan / Permintaan</th>
      <th>Tindakan IT</th>
      <th>Status</th>

  </tr>
  `;

  data.forEach(row=>{

    const dt = new Date(row.tanggal);

    const tanggal =
    dt.toLocaleDateString("id-ID",{
        timeZone:"Asia/Jakarta"
    });

    const jam =
    dt.toLocaleTimeString("id-ID",{
        timeZone:"Asia/Jakarta",
        hour12:false
    });

    html += `
    <tr>

        <td>${tanggal}</td>

        <td>${jam}</td>

        <td>${row.user_name || ''}</td>

        <td>${row.divisi || ''}</td>

        <td>${row.pekerjaan || ''}</td>

        <td>${row.tindakan || ''}</td>

        <td>${row.status || ''}</td>

    </tr>
    `;
});

  html += "</table>";

  const blob =
    window.htmlDocx.asBlob(html);

  const link =
    document.createElement("a");

  link.href =
    URL.createObjectURL(blob);

  link.download =
    `Laporan_IT_${startDate || 'Semua'}_${endDate || 'Data'}.docx`;

  link.click();
}


const today =
new Date().toISOString().split('T')[0];

document.getElementById("startDate").value = today;
document.getElementById("endDate").value = today;

document
.getElementById("startDate")
.addEventListener("change", loadTasks);

document
.getElementById("endDate")
.addEventListener("change", loadTasks);

// AUTO START
checkERP();
loadSparepartStock();
loadServerTemperature();
loadTasks();

// AUTO REFRESH 1 JAM
setInterval(checkERP, 60 * 60 * 1000);
setInterval(loadSparepartStock, 60 * 60 * 1000);
setInterval(loadServerTemperature, 60 * 60 * 1000);
setInterval(loadTasks, 60 * 60 * 1000);

</script>
